<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Pole Position Elite — Hyundai Championship</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Barlow:wght@300;400;500;600;700&family=Barlow+Condensed:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#e60023;--red-glow:#ff1a3d;--red-soft:rgba(230,0,35,.15);
  --gold:#ffd700;--silver:#c0c0c0;--bronze:#cd7f32;
  --bg:#08080c;--surface:#111118;--surface2:#1a1a24;--surface3:#22222e;
  --border:#2a2a38;--muted:#6b6b80;--text:#e8e8f0;--white:#fff;
  --green:#00c853;--blue:#448aff;--amber:#ffab00;
  --font-display:'Oswald',sans-serif;
  --font-body:'Barlow',sans-serif;
  --font-condensed:'Barlow Condensed',sans-serif;
}
html{scroll-behavior:smooth}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;z-index:9999;pointer-events:none;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.03'/%3E%3C/svg%3E");
  background-size:128px;opacity:.4}

.header{position:relative;background:linear-gradient(135deg,#0d0d14,#14141f);border-bottom:1px solid var(--border);overflow:hidden}
.header::before{content:'';position:absolute;top:-50%;left:-10%;width:120%;height:200%;background:conic-gradient(from 180deg at 50% 50%,transparent 0deg,var(--red) 10deg,transparent 20deg);opacity:.06;animation:hSpin 20s linear infinite}
@keyframes hSpin{to{transform:rotate(360deg)}}
.header-inner{position:relative;max-width:1400px;margin:0 auto;padding:20px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:center;gap:14px}
.logo-icon{width:48px;height:48px;background:var(--red);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:24px;box-shadow:0 0 20px rgba(230,0,35,.4),0 0 60px rgba(230,0,35,.15)}
.logo-text{font-family:var(--font-display);font-size:clamp(20px,4vw,32px);font-weight:700;letter-spacing:3px;text-transform:uppercase;color:var(--white)}
.logo-sub{font-family:var(--font-condensed);font-size:13px;letter-spacing:4px;color:var(--muted);text-transform:uppercase}
.header-right{display:flex;align-items:center;gap:12px;flex-wrap:wrap;justify-content:center}
.live-badge{display:flex;align-items:center;gap:8px;background:rgba(230,0,35,.12);border:1px solid rgba(230,0,35,.3);border-radius:100px;padding:8px 18px;font-family:var(--font-condensed);font-weight:600;font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--red-glow)}
.live-dot{width:8px;height:8px;background:var(--red);border-radius:50%;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:1;box-shadow:0 0 0 0 rgba(230,0,35,.6)}50%{opacity:.6;box-shadow:0 0 0 8px rgba(230,0,35,0)}}
.demo-badge{background:rgba(68,138,255,.12);border:1px solid rgba(68,138,255,.3);color:var(--blue);border-radius:100px;padding:6px 14px;font-family:var(--font-condensed);font-size:11px;letter-spacing:2px;text-transform:uppercase}

.main{max-width:1400px;margin:0 auto;padding:20px 24px 60px}
.section-title{font-family:var(--font-display);font-size:15px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:16px;display:flex;align-items:center;gap:10px}
.section-title::after{content:'';flex:1;height:1px;background:var(--border)}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:28px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;position:relative;overflow:hidden;transition:border-color .3s,transform .2s}
.stat-card:hover{border-color:rgba(230,0,35,.4);transform:translateY(-2px)}
.stat-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--red),transparent);opacity:0;transition:opacity .3s}
.stat-card:hover::before{opacity:1}
.stat-label{font-family:var(--font-condensed);font-size:11px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:6px}
.stat-value{font-family:var(--font-display);font-size:30px;font-weight:700;color:var(--white)}
.stat-sub{font-size:12px;color:var(--muted);margin-top:2px}

.podium{display:flex;align-items:flex-end;justify-content:center;gap:12px;padding:20px 0 0;margin-bottom:28px}
.podium-place{text-align:center;border-radius:16px 16px 0 0;position:relative;overflow:hidden;transition:transform .3s}
.podium-place:hover{transform:translateY(-4px)}
.podium-place.first{order:2;background:linear-gradient(180deg,rgba(255,215,0,.1),rgba(255,215,0,.03));border:1px solid rgba(255,215,0,.2);border-bottom:none;min-height:220px;flex:1.2}
.podium-place.second{order:1;background:linear-gradient(180deg,rgba(192,192,192,.08),rgba(192,192,192,.02));border:1px solid rgba(192,192,192,.15);border-bottom:none;min-height:180px;flex:1}
.podium-place.third{order:3;background:linear-gradient(180deg,rgba(205,127,50,.08),rgba(205,127,50,.02));border:1px solid rgba(205,127,50,.15);border-bottom:none;min-height:150px;flex:1}
.podium-rank{font-family:var(--font-display);font-size:48px;font-weight:700;opacity:.15;margin-top:16px}
.podium-place.first .podium-rank{color:var(--gold)}.podium-place.second .podium-rank{color:var(--silver)}.podium-place.third .podium-rank{color:var(--bronze)}
.podium-name{font-family:var(--font-display);font-size:clamp(14px,2.5vw,20px);font-weight:700;color:var(--white);padding:0 12px;margin-top:4px}
.podium-site{font-family:var(--font-condensed);font-size:12px;color:var(--muted);letter-spacing:1px;text-transform:uppercase;margin-top:4px}
.podium-laps{font-family:var(--font-display);font-size:clamp(24px,4vw,36px);font-weight:700;margin-top:8px;padding-bottom:20px}
.podium-place.first .podium-laps{color:var(--gold)}.podium-place.second .podium-laps{color:var(--silver)}.podium-place.third .podium-laps{color:var(--bronze)}
.podium-laps span{font-size:14px;font-weight:400;color:var(--muted);margin-left:4px}

.track{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:28px;position:relative;overflow:hidden}
.track::before{content:'';position:absolute;top:0;left:0;bottom:0;width:4px;background:var(--red)}
.track-row{display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid rgba(255,255,255,.04)}
.track-row:last-child{border-bottom:none}
.track-pos{font-family:var(--font-display);font-size:18px;font-weight:700;width:30px;text-align:center;color:var(--muted)}
.track-pos.p1{color:var(--gold)}.track-pos.p2{color:var(--silver)}.track-pos.p3{color:var(--bronze)}
.track-driver{flex:1;min-width:0}
.track-driver-name{font-weight:600;font-size:14px;color:var(--white);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.track-driver-site{font-family:var(--font-condensed);font-size:11px;color:var(--muted);letter-spacing:1px;text-transform:uppercase}
.track-bar-wrap{flex:2;height:28px;background:var(--surface2);border-radius:6px;overflow:hidden}
.track-bar{height:100%;border-radius:6px;transition:width 1.2s cubic-bezier(.22,1,.36,1);display:flex;align-items:center;justify-content:flex-end;padding-right:10px;min-width:40px}
.track-bar.p1{background:linear-gradient(90deg,rgba(230,0,35,.7),var(--red))}
.track-bar.p2{background:linear-gradient(90deg,rgba(230,0,35,.5),rgba(230,0,35,.7))}
.track-bar.p3{background:linear-gradient(90deg,rgba(230,0,35,.35),rgba(230,0,35,.55))}
.track-bar.other{background:linear-gradient(90deg,rgba(230,0,35,.2),rgba(230,0,35,.35))}
.track-bar em{font-family:var(--font-condensed);font-size:12px;font-weight:700;color:#fff;text-shadow:0 1px 2px rgba(0,0,0,.5);font-style:normal}

.sites-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:28px}
.site-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:18px 20px;transition:all .3s}
.site-card:hover{border-color:rgba(230,0,35,.3);transform:translateY(-2px)}
.site-card-header{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.site-name{font-family:var(--font-display);font-size:16px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--white)}
.site-laps{font-family:var(--font-display);font-size:24px;font-weight:700;color:var(--red-glow)}
.site-laps i{font-size:11px;color:var(--muted);font-weight:400;font-style:normal;margin-left:2px}
.site-meta{font-family:var(--font-condensed);font-size:12px;color:var(--muted);letter-spacing:1px;display:flex;gap:14px;margin-bottom:8px}
.site-meta .hl{color:var(--green)}
.site-bar{height:4px;background:var(--surface3);border-radius:2px;margin-top:10px;overflow:hidden}
.site-bar-fill{height:100%;background:var(--red);border-radius:2px;transition:width 1s ease}

.journeys{background:var(--surface);border:1px solid var(--border);border-radius:14px;margin-bottom:28px;overflow:hidden}
.j-row{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid rgba(255,255,255,.04)}
.j-row:last-child{border-bottom:none}
.j-cust{flex:1;min-width:0}
.j-cust-name{font-weight:600;font-size:14px;color:var(--white)}
.j-cust-id{font-family:var(--font-condensed);font-size:12px;color:var(--red-glow);letter-spacing:1px;font-weight:600}
.j-cust-meta{font-family:var(--font-condensed);font-size:11px;color:var(--muted);letter-spacing:1px}
.j-pips{display:flex;gap:4px;flex-shrink:0}
.j-pip{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:12px;background:var(--surface3);border:1px solid var(--border);transition:all .3s}
.j-pip.done{background:rgba(0,200,83,.15);border-color:rgba(0,200,83,.3)}
.j-pip .ico{opacity:.3}.j-pip.done .ico{opacity:1}
.j-status{font-family:var(--font-condensed);font-size:11px;letter-spacing:1px;text-transform:uppercase;padding:4px 10px;border-radius:100px;flex-shrink:0}
.j-status.full{background:rgba(0,200,83,.12);border:1px solid rgba(0,200,83,.3);color:var(--green)}
.j-status.partial{background:var(--surface2);border:1px solid var(--border);color:var(--muted)}

.feed{background:var(--surface);border:1px solid var(--border);border-radius:14px;max-height:280px;overflow-y:auto;margin-bottom:28px;scrollbar-width:thin;scrollbar-color:var(--surface3) transparent}
.feed::-webkit-scrollbar{width:6px}.feed::-webkit-scrollbar-thumb{background:var(--surface3);border-radius:3px}
.feed-item{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid rgba(255,255,255,.03);animation:feedIn .4s ease}
.feed-item:last-child{border-bottom:none}
@keyframes feedIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.feed-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.feed-dot.a{background:var(--red)}.feed-dot.b{background:var(--green)}.feed-dot.j{background:var(--amber)}
.feed-text{font-size:13px;color:var(--text);flex:1}.feed-text strong{color:var(--white);font-weight:600}
.feed-time{font-family:var(--font-condensed);font-size:11px;color:var(--muted);flex-shrink:0}

.md-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:28px}
.md-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:20px}
.md-card h4{font-family:var(--font-display);font-size:13px;letter-spacing:2px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.md-row{display:flex;justify-content:space-between;padding:6px 0;border-bottom:1px solid rgba(255,255,255,.03);font-size:13px}
.md-row:last-child{border-bottom:none}
.md-row .l{color:var(--muted)}.md-row .v{font-weight:600;color:var(--white)}

.config-banner{background:linear-gradient(135deg,rgba(230,0,35,.08),rgba(68,138,255,.08));border:1px dashed rgba(230,0,35,.3);border-radius:14px;padding:28px;margin-bottom:28px;text-align:center}
.config-banner h3{font-family:var(--font-display);font-size:18px;color:var(--white);margin-bottom:8px}
.config-banner p{font-size:13px;color:var(--muted);max-width:600px;margin:0 auto 16px}
.config-banner code{background:var(--surface2);padding:2px 8px;border-radius:4px;font-size:12px;color:var(--red-glow)}
.ci{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 16px;color:var(--white);font-size:14px;width:100%;max-width:520px;margin-bottom:10px;font-family:var(--font-body)}
.ci:focus{outline:none;border-color:var(--red)}
.cb{background:var(--red);color:#fff;border:none;border-radius:8px;padding:10px 28px;font-family:var(--font-condensed);font-weight:700;font-size:14px;letter-spacing:1px;text-transform:uppercase;cursor:pointer;transition:all .2s}
.cb:hover{background:var(--red-glow);transform:translateY(-1px)}
.cb.sec{background:transparent;border:1px solid var(--border);color:var(--muted);margin-left:8px;font-size:11px;padding:6px 14px}
.cb.sec:hover{border-color:var(--red);color:var(--red-glow);background:transparent}
.empty-state{padding:24px;text-align:center;color:var(--muted);font-size:13px}

.footer{text-align:center;padding:30px 24px;border-top:1px solid var(--border);font-family:var(--font-condensed);font-size:12px;color:var(--muted);letter-spacing:2px;text-transform:uppercase}
.footer a{color:var(--red-glow);text-decoration:none}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:20px}
.spinner{width:48px;height:48px;border:3px solid var(--surface3);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-text{font-family:var(--font-condensed);font-size:14px;letter-spacing:3px;text-transform:uppercase;color:var(--muted)}

@media(max-width:768px){
  .header-inner{flex-direction:column;text-align:center}
  .podium{gap:6px}.podium-place{flex:1!important}
  .track-row{flex-wrap:wrap}.track-bar-wrap{flex-basis:100%;order:3}
  .sites-grid{grid-template-columns:1fr}
  .j-pips{gap:2px}.j-pip{width:22px;height:22px;font-size:10px}
}
</style>
</head>
<body>

<div class="header"><div class="header-inner">
  <div class="logo">
    <div class="logo-icon">🏁</div>
    <div><div class="logo-text">Pole Position Elite</div><div class="logo-sub">Hyundai Championship</div></div>
  </div>
  <div class="header-right">
    <div class="live-badge"><span class="live-dot"></span> Live</div>
    <div id="modeBadge"></div>
  </div>
</div></div>

<div class="main" id="app">
  <div class="loading" id="loadingState"><div class="spinner"></div><div class="loading-text">Loading championship data…</div></div>
</div>

<div class="footer">
  Pole Position Elite &mdash; Hyundai Dealership Network &mdash;
  <a href="#" id="formLink" target="_blank">Submit Entry</a> &mdash; Auto-refreshes every 30s
</div>

<script>
const SHEET_CSV_URL=localStorage.getItem('polepos_csv')||'';
const FORM_URL=localStorage.getItem('polepos_form')||'';
const POINTS={"New Car Order":5,"Test Drive":2,"Part Exchange":2,"Appointment Booked":1,"Finance Proposal":1};
const ALL_ACT=Object.keys(POINTS);
const FJ_BONUS=5;
const SITES=["Boston","Kings Lynn","Lincoln","Worksop","Burton"];
const ACT_ICONS={"New Car Order":"🚗","Appointment Booked":"📅","Test Drive":"🏎️","Finance Proposal":"💰","Part Exchange":"🔄"};

function genDemo(){
  const ppl=[{n:"James Carter",s:"Boston"},{n:"Sophie Williams",s:"Kings Lynn"},{n:"Marcus Chen",s:"Lincoln"},{n:"Emma Thompson",s:"Worksop"},{n:"Liam O'Brien",s:"Burton"},{n:"Olivia Hughes",s:"Boston"},{n:"Noah Patel",s:"Kings Lynn"},{n:"Ava Mitchell",s:"Lincoln"},{n:"Ethan Brooks",s:"Worksop"},{n:"Mia Foster",s:"Burton"},{n:"Jack Reynolds",s:"Boston"},{n:"Charlotte Davis",s:"Lincoln"},{n:"Harry Wilson",s:"Kings Lynn"},{n:"Isla Martin",s:"Burton"},{n:"George Taylor",s:"Worksop"}];
  const cust=["Mr Smith","Mrs Jones","Mr Patel","Ms Green","Mr Brown","Mrs Lee","Mr Wilson","Ms Clark","Mr Taylor","Mrs White","Mr Harris","Ms Robinson","Mr Walker","Mrs Hall","Mr King","Ms Wright","Mr Young","Mrs Allen"];
  const vehs=["Tucson","Kona","i20","IONIQ 5","i30","Bayon","IONIQ 6","Santa Fe"];
  const rows=[];let custCounter={};
  ppl.forEach(p=>{
    const nc=2+Math.floor(Math.random()*3);
    const sc=[...cust].sort(()=>Math.random()-.5).slice(0,nc);
    sc.forEach(c=>{
      const initials=(p.n.split(' ')[0][0]+p.n.split(' ').pop()[0]).toUpperCase();
      if(!custCounter[initials])custCounter[initials]=0;
      custCounter[initials]++;
      const cid=initials+'-'+String(custCounter[initials]).padStart(4,'0');
      const na=1+Math.floor(Math.random()*5);
      const acts=[...ALL_ACT].sort(()=>Math.random()-.5).slice(0,na);
      acts.forEach(a=>{rows.push({salesperson:p.n,site:p.s,activity:a,customerId:cid,customerName:c,vehicle:vehs[Math.floor(Math.random()*vehs.length)]})});
    });
  });
  return rows;
}

function processRows(rows){
  const ppl={},jMap={};
  rows.forEach(r=>{
    const key=r.customerId||r.salesperson+'|||'+r.customerName;
    if(!jMap[key])jMap[key]={id:r.customerId||'',name:r.customerName,sp:r.salesperson,site:r.site,veh:r.vehicle||'',acts:new Set(),laps:0,bonus:false};
    if(!jMap[key].acts.has(r.activity)){jMap[key].acts.add(r.activity);jMap[key].laps+=POINTS[r.activity]||0;if(r.vehicle)jMap[key].veh=r.vehicle}
  });
  Object.values(jMap).forEach(j=>{if(j.acts.size===ALL_ACT.length)j.bonus=true});
  Object.values(jMap).forEach(j=>{
    if(!ppl[j.sp])ppl[j.sp]={site:j.site,laps:0,jn:0,fj:0};
    ppl[j.sp].laps+=j.laps+(j.bonus?FJ_BONUS:0);ppl[j.sp].jn++;if(j.bonus)ppl[j.sp].fj++;
  });
  const lb=Object.entries(ppl).map(([n,i])=>({name:n,site:i.site,laps:i.laps,jn:i.jn,fj:i.fj})).sort((a,b)=>b.laps-a.laps);
  const jy=Object.values(jMap).map(j=>({id:j.id,customer:j.name,sp:j.sp,site:j.site,veh:j.veh,acts:Array.from(j.acts),pct:Math.round(j.acts.size/ALL_ACT.length*100),laps:j.laps,bonus:j.bonus?FJ_BONUS:0})).sort((a,b)=>b.pct-a.pct||b.laps-a.laps);
  return{leaderboard:lb,journeys:jy};
}

let prevLB=[],feedItems=[],isDemo=false,cached=null;

async function fetchAndProcess(){
  if(!SHEET_CSV_URL){isDemo=true;return processRows(genDemo())}
  isDemo=false;
  try{
    const r=await fetch(SHEET_CSV_URL);const t=await r.text();
    const lb=t.split("\n").slice(1).map(r=>{const c=r.split(",");return{name:(c[0]||'').trim(),site:(c[1]||'').trim(),laps:parseInt(c[2])||0,jn:0,fj:0}}).filter(r=>r.name);
    return{leaderboard:lb,journeys:[]};
  }catch(e){console.error(e);isDemo=true;return processRows(genDemo())}
}

function render(data){
  const{leaderboard:lb,journeys:jy}=data;
  const maxL=lb[0]?.laps||1,totL=lb.reduce((s,d)=>s+d.laps,0),totP=lb.length;
  const totFJ=jy.filter(j=>j.pct===100).length,totC=jy.length;
  const sd={};SITES.forEach(s=>sd[s]={laps:0,m:0,fj:0});
  lb.forEach(d=>{if(sd[d.site]!==undefined){sd[d.site].laps+=d.laps;sd[d.site].m++}});
  jy.filter(j=>j.pct===100).forEach(j=>{if(sd[j.site])sd[j.site].fj++});
  const maxSL=Math.max(...Object.values(sd).map(s=>s.laps),1);
  if(prevLB.length){lb.forEach(d=>{const p=prevLB.find(x=>x.name===d.name);if(p&&d.laps>p.laps)feedItems.unshift({t:'a',text:`<strong>${d.name}</strong> earned <strong>+${d.laps-p.laps}</strong> laps`,time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})})});feedItems=feedItems.slice(0,50)}
  document.getElementById('modeBadge').innerHTML=isDemo?'<span class="demo-badge">⚡ Demo Mode</span>':'';
  if(FORM_URL)document.getElementById('formLink').href=FORM_URL;
  const app=document.getElementById('app');let h='';

  if(!SHEET_CSV_URL){
    h+=`<div class="config-banner"><h3>🔧 Connect Your Google Sheet</h3><p>Showing demo data. Paste the published CSV URL from your <code>Leaderboard</code> tab to go live.</p>
    <input type="text" class="ci" id="csvInput" placeholder="https://docs.google.com/spreadsheets/d/.../pub?output=csv"/><br/>
    <input type="text" class="ci" id="formInput" placeholder="Web app URL from Google Apps Script (your entry form)"/><br/>
    <button class="cb" onclick="saveConfig()">Connect &amp; Go Live</button></div>`;
  }else{
    h+=`<div style="text-align:right;margin-bottom:12px"><button class="cb sec" onclick="if(confirm('Disconnect?')){localStorage.removeItem('polepos_csv');localStorage.removeItem('polepos_form');location.reload()}">Disconnect</button></div>`;
  }

  h+=`<div class="stats-row">
    <div class="stat-card"><div class="stat-label">Total Laps</div><div class="stat-value">${totL.toLocaleString()}</div><div class="stat-sub">Across all sites</div></div>
    <div class="stat-card"><div class="stat-label">Salespeople</div><div class="stat-value">${totP}</div><div class="stat-sub">${SITES.length} dealerships</div></div>
    <div class="stat-card"><div class="stat-label">Leader</div><div class="stat-value">${lb[0]?.laps||0}</div><div class="stat-sub">${lb[0]?.name||'—'}</div></div>
    <div class="stat-card"><div class="stat-label">Customers</div><div class="stat-value">${totC||'—'}</div><div class="stat-sub">${totFJ} full journeys</div></div>
    <div class="stat-card"><div class="stat-label">Bonus Laps</div><div class="stat-value">${totFJ*FJ_BONUS}</div><div class="stat-sub">${FJ_BONUS} per full journey</div></div>
  </div>`;

  h+=`<div class="section-title">Championship Podium</div><div class="podium">`;
  lb.slice(0,3).forEach((d,i)=>{const c=['first','second','third'][i];h+=`<div class="podium-place ${c}"><div class="podium-rank">${i+1}</div><div class="podium-name">${d.name}</div><div class="podium-site">${d.site}</div><div class="podium-laps">${d.laps}<span>laps</span></div></div>`});
  h+=`</div>`;

  h+=`<div class="section-title">Race Positions</div><div class="track">`;
  lb.slice(0,15).forEach((d,i)=>{const pct=Math.max(d.laps/maxL*100,8);const pc=i<3?`p${i+1}`:'';const bc=i<3?`p${i+1}`:'other';
    h+=`<div class="track-row"><div class="track-pos ${pc}">${i+1}</div><div class="track-driver"><div class="track-driver-name">${d.name}</div><div class="track-driver-site">${d.site}</div></div><div class="track-bar-wrap"><div class="track-bar ${bc}" style="width:${pct}%"><em>${d.laps}</em></div></div></div>`});
  h+=`</div>`;

  const ss=Object.entries(sd).sort((a,b)=>b[1].laps-a[1].laps);
  h+=`<div class="section-title">Site Performance</div><div class="sites-grid">`;
  ss.forEach(([n,info])=>{const pct=info.laps/maxSL*100;const avg=info.m?(info.laps/info.m).toFixed(1):0;const top=lb.find(d=>d.site===n);
    h+=`<div class="site-card"><div class="site-card-header"><div><div class="site-name">${n}</div></div><div class="site-laps">${info.laps}<i>laps</i></div></div>
    <div class="site-meta"><span>${info.m} salespeople</span><span>Avg ${avg}</span>${info.fj?`<span class="hl">${info.fj} full journey${info.fj>1?'s':''}</span>`:''}</div>
    <div style="font-size:12px;color:var(--muted)">Top: <span style="color:var(--white)">${top?.name||'—'}</span></div>
    <div class="site-bar"><div class="site-bar-fill" style="width:${pct}%"></div></div></div>`});
  h+=`</div>`;

  if(jy.length){
    h+=`<div class="section-title">Customer Journeys</div><div class="journeys">`;
    jy.slice(0,20).forEach(j=>{const sc=j.pct===100?'full':'partial';const lab=j.pct===100?`✓ +${FJ_BONUS}`:j.pct+'%';
      h+=`<div class="j-row"><div class="j-cust"><div class="j-cust-name">${j.customer}</div>${j.id?`<div class="j-cust-id">${j.id}</div>`:''}<div class="j-cust-meta">${j.sp} · ${j.site}${j.veh?' · '+j.veh:''}</div></div><div class="j-pips">`;
      ALL_ACT.forEach(a=>{const d=j.acts.includes(a);h+=`<div class="j-pip ${d?'done':''}" title="${a}"><span class="ico">${ACT_ICONS[a]}</span></div>`});
      h+=`</div><div class="j-status ${sc}">${lab}</div></div>`});
    h+=`</div>`;
  }

  h+=`<div class="section-title">Live Activity Feed</div><div class="feed">`;
  if(!feedItems.length)h+=`<div class="empty-state">Waiting for activity updates…</div>`;
  else feedItems.forEach(f=>{h+=`<div class="feed-item"><div class="feed-dot ${f.t}"></div><div class="feed-text">${f.text}</div><div class="feed-time">${f.time}</div></div>`});
  h+=`</div>`;

  const avgL=totP?(totL/totP).toFixed(1):0;
  h+=`<div class="section-title">MD Dashboard</div><div class="md-grid">
    <div class="md-card"><h4>Championship Overview</h4>
      <div class="md-row"><span class="l">Total Laps</span><span class="v">${totL}</span></div>
      <div class="md-row"><span class="l">Active Salespeople</span><span class="v">${totP}</span></div>
      <div class="md-row"><span class="l">Avg Laps / Person</span><span class="v">${avgL}</span></div>
      <div class="md-row"><span class="l">Leader Gap</span><span class="v">${lb.length>1?lb[0].laps-lb[1].laps:0} laps</span></div>
      <div class="md-row"><span class="l">Full Journeys</span><span class="v">${totFJ}</span></div>
      <div class="md-row"><span class="l">Bonus Laps Earned</span><span class="v">${totFJ*FJ_BONUS}</span></div>
    </div>
    <div class="md-card"><h4>Site Rankings</h4>`;
  ss.forEach(([n,info],i)=>{const avg=info.m?(info.laps/info.m).toFixed(1):0;h+=`<div class="md-row"><span class="l">${i+1}. ${n}</span><span class="v">${info.laps} laps (${avg} avg)</span></div>`});
  h+=`</div><div class="md-card"><h4>Points System</h4>
    <div class="md-row"><span class="l">🚗 New Car Order</span><span class="v">5 laps</span></div>
    <div class="md-row"><span class="l">🏎️ Test Drive</span><span class="v">2 laps</span></div>
    <div class="md-row"><span class="l">🔄 Part Exchange</span><span class="v">2 laps</span></div>
    <div class="md-row"><span class="l">📅 Appointment Booked</span><span class="v">1 lap</span></div>
    <div class="md-row"><span class="l">💰 Finance Proposal</span><span class="v">1 lap</span></div>
    <div class="md-row"><span class="l">🎯 Full Journey Bonus</span><span class="v" style="color:var(--green)">${FJ_BONUS} laps</span></div>
  </div></div>`;

  app.innerHTML=h;prevLB=JSON.parse(JSON.stringify(lb));
}

function saveConfig(){const c=document.getElementById('csvInput')?.value?.trim();const f=document.getElementById('formInput')?.value?.trim();if(c){localStorage.setItem('polepos_csv',c);if(f)localStorage.setItem('polepos_form',f);location.reload()}}

async function update(){try{const d=await fetchAndProcess();document.getElementById('loadingState')?.remove();cached=d;render(d)}catch(e){console.error(e)}}
update();setInterval(update,30000);

if(!SHEET_CSV_URL){setInterval(()=>{if(isDemo&&cached){const lb=cached.leaderboard;if(lb.length){const p=lb[Math.floor(Math.random()*lb.length)];const g=Math.floor(Math.random()*4)+1;p.laps+=g;lb.sort((a,b)=>b.laps-a.laps);
  const ts=['a','b','j'],t=ts[Math.floor(Math.random()*ts.length)];
  const msgs={a:`<strong>${p.name}</strong> logged a <strong>${ALL_ACT[Math.floor(Math.random()*ALL_ACT.length)]}</strong>`,b:`<strong>${p.name}</strong> completed a full customer journey! <strong>+${FJ_BONUS} bonus</strong>`,j:`<strong>${p.name}</strong> started working with a new customer`};
  feedItems.unshift({t,text:msgs[t],time:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})});feedItems=feedItems.slice(0,50);render(cached)}}},6000)}
</script>
</body>
</html>
