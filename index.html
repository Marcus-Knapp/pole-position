<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Pole Position Elite — Hyundai Championship</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#e60023;--red-light:#fff0f2;--red-mid:#ffc9c9;
  --gold:#f59f00;--gold-bg:#fff9db;--silver:#868e96;--silver-bg:#f1f3f5;--bronze:#d9480f;--bronze-bg:#fff4e6;
  --bg:#f4f6f9;--white:#fff;--card:#fff;--border:#e8eaed;
  --text:#1a1a2e;--muted:#868e96;--dark:#343a40;
  --green:#00c853;--green-bg:#edfff4;--blue:#1971c2;--blue-bg:#e7f5ff;--amber:#f59f00;
  --font-display:'Plus Jakarta Sans',sans-serif;--font-body:'DM Sans',sans-serif;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 4px 12px rgba(0,0,0,.08);
}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh}
.header{background:var(--white);border-bottom:3px solid var(--red);position:sticky;top:0;z-index:100}
.header-inner{max-width:1400px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:44px;height:44px;background:var(--red);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;box-shadow:0 2px 8px rgba(230,0,35,.25)}
.logo-text{font-family:var(--font-display);font-size:clamp(18px,3vw,26px);font-weight:800;color:var(--red)}
.logo-sub{font-size:12px;font-weight:500;color:var(--muted);letter-spacing:1px}
.header-right{display:flex;align-items:center;gap:10px}
.live-badge{display:flex;align-items:center;gap:6px;background:var(--red-light);border:1px solid var(--red-mid);border-radius:100px;padding:6px 14px;font-weight:600;font-size:12px;color:var(--red)}
.live-dot{width:7px;height:7px;background:var(--red);border-radius:50%;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(230,0,35,.4)}50%{box-shadow:0 0 0 6px rgba(230,0,35,0)}}
.updated{font-size:11px;color:var(--muted);font-weight:500}
.main{max-width:1400px;margin:0 auto;padding:24px 24px 60px}
.stitle{font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.stitle::after{content:'';flex:1;height:1px;background:var(--border)}
.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(155px,1fr));gap:12px;margin-bottom:28px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow);transition:transform .2s}
.stat:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px}
.stat-value{font-family:var(--font-display);font-size:30px;font-weight:800;color:var(--text)}
.stat-sub{font-size:12px;color:var(--muted);margin-top:2px}
.podium{display:flex;align-items:flex-end;justify-content:center;gap:14px;padding:10px 0 0;margin-bottom:28px}
.pp{text-align:center;border-radius:16px 16px 0 0;padding:20px 16px;transition:transform .3s;box-shadow:var(--shadow)}
.pp:hover{transform:translateY(-4px)}
.pp.first{order:2;background:var(--gold-bg);border:2px solid #ffe066;min-height:200px;flex:1.2}
.pp.second{order:1;background:var(--silver-bg);border:2px solid #dee2e6;min-height:170px;flex:1}
.pp.third{order:3;background:var(--bronze-bg);border:2px solid #ffc078;min-height:150px;flex:1}
.pp-rank{font-family:var(--font-display);font-size:44px;font-weight:800;opacity:.2}
.pp.first .pp-rank{color:var(--gold)}.pp.second .pp-rank{color:var(--silver)}.pp.third .pp-rank{color:var(--bronze)}
.pp-name{font-family:var(--font-display);font-size:clamp(14px,2.5vw,20px);font-weight:800;color:var(--text);margin-top:4px}
.pp-site{font-size:12px;font-weight:500;color:var(--muted);margin-top:4px}
.pp-laps{font-family:var(--font-display);font-size:clamp(22px,4vw,34px);font-weight:800;margin-top:8px}
.pp.first .pp-laps{color:var(--gold)}.pp.second .pp-laps{color:var(--silver)}.pp.third .pp-laps{color:var(--bronze)}
.pp-laps span{font-size:13px;font-weight:500;color:var(--muted);margin-left:3px}
.board{background:var(--card);border:1px solid var(--border);border-radius:16px;margin-bottom:28px;box-shadow:var(--shadow);overflow:hidden}
.b-row{border-bottom:1px solid #f1f3f5}
.b-row:last-child{border-bottom:none}
.b-main{display:flex;align-items:center;gap:14px;padding:14px 18px;cursor:pointer;transition:background .15s}
.b-main:hover{background:#f8f9fa}
.b-pos{font-family:var(--font-display);font-size:18px;font-weight:800;width:30px;text-align:center;color:var(--muted)}
.b-pos.p1{color:var(--gold)}.b-pos.p2{color:var(--silver)}.b-pos.p3{color:var(--bronze)}
.b-info{flex:1;min-width:0}
.b-name{font-weight:600;font-size:14px;color:var(--text)}
.b-site{font-size:11px;color:var(--muted);font-weight:500}
.b-bar-w{flex:1.5;height:26px;background:#f1f3f5;border-radius:6px;overflow:hidden}
.b-bar{height:100%;border-radius:6px;transition:width 1s;display:flex;align-items:center;justify-content:flex-end;padding-right:10px;min-width:36px}
.b-bar.p1{background:linear-gradient(90deg,#ff6b6b,var(--red))}.b-bar.p2{background:linear-gradient(90deg,#ff8787,#ff6b6b)}.b-bar.p3{background:linear-gradient(90deg,#ffa8a8,#ff8787)}.b-bar.ot{background:linear-gradient(90deg,#ffc9c9,#ffa8a8)}
.b-bar em{font-family:var(--font-display);font-size:12px;font-weight:700;color:#fff;font-style:normal}
.b-toggle{font-size:11px;color:var(--muted);margin-left:8px;flex-shrink:0}
.b-sales{display:none;padding:0 18px 14px 62px}
.b-sales.open{display:block}
.b-sale{display:flex;align-items:center;gap:8px;padding:5px 0;font-size:12px;border-bottom:1px solid #f8f9fa}
.b-sale:last-child{border-bottom:none}
.b-sale-ico{font-size:14px;width:22px;text-align:center}
.b-sale-act{color:var(--muted);font-weight:500;min-width:120px}
.b-sale-cust{color:var(--text);font-weight:600;flex:1}
.b-sale-veh{color:var(--blue);font-weight:500;font-size:11px}
.b-sale-laps{font-family:var(--font-display);font-weight:700;color:var(--red);min-width:40px;text-align:right}
.b-sale-date{color:var(--muted);font-size:11px;min-width:50px;text-align:right}
.sites-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:28px}
.site-c{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow);transition:all .2s}
.site-c:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.site-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.site-nm{font-family:var(--font-display);font-size:16px;font-weight:800;color:var(--text)}
.site-laps{font-family:var(--font-display);font-size:24px;font-weight:800;color:var(--red)}
.site-laps i{font-size:11px;color:var(--muted);font-weight:400;font-style:normal;margin-left:2px}
.site-meta{font-size:12px;color:var(--muted);font-weight:500;display:flex;gap:14px;margin-bottom:6px}
.site-meta .hl{color:var(--green);font-weight:600}
.site-bar{height:5px;background:#f1f3f5;border-radius:3px;margin-top:10px;overflow:hidden}
.site-bar-f{height:100%;background:linear-gradient(90deg,#ff6b6b,var(--red));border-radius:3px;transition:width 1s}
.jny{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:28px;box-shadow:var(--shadow);overflow:hidden}
.jr{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid #f1f3f5}
.jr:last-child{border-bottom:none}
.jr-cust{flex:1;min-width:0}
.jr-cn{font-weight:600;font-size:14px;color:var(--text)}
.jr-cid{font-size:12px;font-weight:700;color:var(--red)}
.jr-cm{font-size:11px;color:var(--muted)}
.jr-pips{display:flex;gap:4px;flex-shrink:0}
.jr-pip{width:28px;height:28px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:12px;background:#f1f3f5;border:2px solid #e8eaed}
.jr-pip.dn{background:var(--green-bg);border-color:#b2f2bb}
.jr-pip .ico{opacity:.25}.jr-pip.dn .ico{opacity:1}
.jr-st{font-size:11px;font-weight:700;padding:5px 12px;border-radius:100px;flex-shrink:0}
.jr-st.full{background:var(--green-bg);border:1px solid #b2f2bb;color:var(--green)}
.jr-st.part{background:#f1f3f5;border:1px solid #dee2e6;color:var(--muted)}
.feed{background:var(--card);border:1px solid var(--border);border-radius:14px;max-height:320px;overflow-y:auto;margin-bottom:28px;box-shadow:var(--shadow)}
.fi{display:flex;align-items:center;gap:10px;padding:10px 18px;border-bottom:1px solid #f8f9fa;font-size:13px}
.fi:last-child{border-bottom:none}
.fi-ico{font-size:16px;flex-shrink:0}
.fi-txt{flex:1;color:var(--dark)}.fi-txt strong{color:var(--text);font-weight:600}
.fi-time{font-size:11px;color:var(--muted);flex-shrink:0}
.md-banner{background:var(--red-light);border:2px solid var(--red-mid);border-radius:14px;padding:18px 24px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.md-banner-icon{font-size:28px}
.md-banner-text h3{font-family:var(--font-display);font-size:16px;font-weight:800;color:var(--red)}
.md-banner-text p{font-size:12px;color:var(--muted);margin-top:2px}
.md-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:28px}
.md-c{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;box-shadow:var(--shadow)}
.md-c h4{font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.md-r{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f8f9fa;font-size:13px}
.md-r:last-child{border-bottom:none}
.md-r .l{color:var(--muted);font-weight:500}.md-r .v{font-weight:700;color:var(--text)}
.error-card{background:#fff5f5;border:2px solid #ffc9c9;border-radius:14px;padding:30px;text-align:center;margin-bottom:28px}
.error-card .ei{font-size:36px;margin-bottom:10px}
.error-card .et{font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--red);margin-bottom:6px}
.error-card .em{font-size:13px;color:var(--muted)}
.error-card .retry-btn{display:inline-block;margin-top:14px;padding:10px 24px;background:var(--red);color:#fff;border:none;border-radius:8px;font-weight:600;cursor:pointer}
.empty-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:40px;text-align:center;box-shadow:var(--shadow);margin-bottom:28px}
.empty-card .empty-icon{font-size:40px;margin-bottom:12px}
.empty-card .empty-title{font-family:var(--font-display);font-size:16px;font-weight:700;margin-bottom:6px}
.empty-card .empty-msg{font-size:13px;color:var(--muted);max-width:400px;margin:0 auto}
.footer{text-align:center;padding:30px 24px;border-top:1px solid var(--border);background:var(--white);font-size:12px;color:var(--muted)}
.footer a{color:var(--red);text-decoration:none;font-weight:600}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:40vh;gap:20px}
.spinner{width:44px;height:44px;border:3px solid #e8eaed;border-top-color:var(--red);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;font-weight:600;color:var(--muted)}
.empty{padding:20px;text-align:center;color:var(--muted);font-size:13px}
@media(max-width:768px){
  .header-inner{flex-direction:column;text-align:center}
  .podium{gap:8px}.pp{flex:1!important;padding:14px 10px}
  .b-main{flex-wrap:wrap}.b-bar-w{flex-basis:100%;order:4}
  .sites-grid{grid-template-columns:1fr}
  .jr-pips{gap:2px}.jr-pip{width:22px;height:22px;font-size:10px}
  .b-sales{padding-left:18px}
}
</style>
</head>
<body>

<div class="header"><div class="header-inner">
  <div class="logo">
    <div class="logo-icon">🏁</div>
    <div><div class="logo-text">Pole Position Elite</div><div class="logo-sub">Hyundai Championship</div></div>
  </div>
  <div class="header-right">
    <div class="live-badge"><span class="live-dot"></span> Live</div>
    <div class="updated" id="lastUpdate"></div>
  </div>
</div></div>

<div class="main" id="app"><div class="loading"><div class="spinner"></div><div class="loading-text">Fetching leaderboard…</div></div></div>

<div class="footer">
  Pole Position Elite &mdash; Hyundai &mdash;
  <a href="https://script.google.com/macros/s/AKfycby9BqDs3fFwJeu2tw_diPySS9-WXN1c2PlTIg8HGVjaUxAOlgfbXbaii4nHUyZdI4CO/exec" target="_blank">Submit Entry</a>
  &mdash; Refreshes every 30s
</div>

<script>
// ═══════════════════════════════════════
//  HARDCODED — Your Apps Script web app URL
//  Dashboard calls ?action=data for JSON
// ═══════════════════════════════════════
const API_URL = "https://script.google.com/macros/s/AKfycby9BqDs3fFwJeu2tw_diPySS9-WXN1c2PlTIg8HGVjaUxAOlgfbXbaii4nHUyZdI4CO/exec";
const FORM_URL = API_URL; // Same URL serves the form

const ALL_ACT = ["New Car Order","Test Drive","Part Exchange","Appointment Booked","Finance Proposal"];
const AI = {"New Car Order":"🚗","Appointment Booked":"📅","Test Drive":"🏎️","Finance Proposal":"💰","Part Exchange":"🔄"};
const SITES = ["Boston","Kings Lynn","Lincoln","Worksop","Burton"];
const FJB = 5;

async function fetchData() {
  // Add cache-busting timestamp
  const url = API_URL + "?action=data&_=" + Date.now();
  const res = await fetch(url);
  if (!res.ok) throw new Error("HTTP " + res.status);
  const text = await res.text();

  // Apps Script sometimes returns HTML redirect — handle JSONP-style
  // The response should be pure JSON from ContentService
  let data;
  try {
    data = JSON.parse(text);
  } catch (e) {
    // If it's an HTML page (auth redirect), throw meaningful error
    if (text.indexOf("<!DOCTYPE") > -1 || text.indexOf("<html") > -1) {
      throw new Error("Got HTML instead of JSON. The web app may need redeployment.");
    }
    throw new Error("Invalid JSON response");
  }
  return data;
}

function toggleSales(idx) {
  var el = document.getElementById("sales-" + idx);
  if (el) el.classList.toggle("open");
}

function render(data) {
  const lb = data.leaderboard || [];
  const jy = data.journeys || [];
  const sites = data.sites || [];
  const feedItems = data.feed || [];

  const hasData = lb.length > 0;
  const totL = lb.reduce((s, d) => s + d.laps, 0);
  const totP = lb.length;
  const maxL = lb[0]?.laps || 1;
  const totFJ = jy.filter(j => j.pct === 100).length;
  const maxSL = Math.max(...sites.map(s => s.laps), 1);

  document.getElementById("lastUpdate").textContent = "Updated " + new Date().toLocaleTimeString("en-GB");
  const app = document.getElementById("app");
  let h = "";

  if (!hasData) {
    h += `<div class="empty-card"><div class="empty-icon">📋</div><div class="empty-title">No Entries Yet</div>
      <div class="empty-msg">Submit activities via the <a href="${FORM_URL}" target="_blank" style="color:var(--red);font-weight:600">entry form</a> and they'll appear here within 30 seconds.</div></div>`;
    app.innerHTML = h; return;
  }

  // ── STATS ──
  const topSite = sites[0] || { site: "—", laps: 0 };
  h += `<div class="stats-row">
    <div class="stat"><div class="stat-label">Total Laps</div><div class="stat-value">${totL.toLocaleString()}</div><div class="stat-sub">All sites</div></div>
    <div class="stat"><div class="stat-label">Salespeople</div><div class="stat-value">${totP}</div><div class="stat-sub">${SITES.length} sites</div></div>
    <div class="stat"><div class="stat-label">Leader</div><div class="stat-value">${lb[0].laps}</div><div class="stat-sub">${lb[0].name}</div></div>
    <div class="stat"><div class="stat-label">Top Site</div><div class="stat-value">${topSite.laps}</div><div class="stat-sub">${topSite.site}</div></div>
    <div class="stat"><div class="stat-label">Full Journeys</div><div class="stat-value">${totFJ}</div><div class="stat-sub">+${totFJ * FJB} bonus laps</div></div>
  </div>`;

  // ── PODIUM ──
  if (lb.length >= 3) {
    h += `<div class="stitle">Championship Podium</div><div class="podium">`;
    lb.slice(0, 3).forEach((d, i) => { const c = ["first","second","third"][i];
      h += `<div class="pp ${c}"><div class="pp-rank">${i+1}</div><div class="pp-name">${d.name}</div><div class="pp-site">${d.site}</div><div class="pp-laps">${d.laps}<span>laps</span></div></div>`;
    }); h += `</div>`;
  }

  // ── LEADERBOARD WITH SALES DETAIL ──
  h += `<div class="stitle">Race Positions — click to see sales</div><div class="board">`;
  lb.slice(0, 20).forEach((d, i) => {
    const pct = Math.max(d.laps / maxL * 100, 8);
    const pc = i < 3 ? `p${i+1}` : ""; const bc = i < 3 ? `p${i+1}` : "ot";
    const sales = d.sales || [];
    h += `<div class="b-row">
      <div class="b-main" onclick="toggleSales(${i})">
        <div class="b-pos ${pc}">${i+1}</div>
        <div class="b-info"><div class="b-name">${d.name}</div><div class="b-site">${d.site}</div></div>
        <div class="b-bar-w"><div class="b-bar ${bc}" style="width:${pct}%"><em>${d.laps}</em></div></div>
        <div class="b-toggle">${sales.length} ${sales.length===1?'sale':'sales'} ▾</div>
      </div>
      <div class="b-sales" id="sales-${i}">`;
    if (sales.length === 0) { h += `<div style="color:var(--muted);font-size:12px;padding:4px 0">No activity details</div>`; }
    else { sales.forEach(s => {
      h += `<div class="b-sale">
        <div class="b-sale-ico">${AI[s.activity] || "•"}</div>
        <div class="b-sale-act">${s.activity}</div>
        <div class="b-sale-cust">${s.customer} <span style="color:var(--muted);font-size:10px">${s.customerId}</span></div>
        ${s.vehicle ? `<div class="b-sale-veh">${s.vehicle}</div>` : ""}
        <div class="b-sale-laps">+${s.laps}</div>
        <div class="b-sale-date">${s.date}</div>
      </div>`;
    }); }
    h += `</div></div>`;
  }); h += `</div>`;

  // ── SITE PERFORMANCE ──
  h += `<div class="stitle">Site Performance</div><div class="sites-grid">`;
  sites.forEach(s => {
    const pct = maxSL > 0 ? s.laps / maxSL * 100 : 0;
    const top = lb.find(d => d.site === s.site);
    h += `<div class="site-c"><div class="site-hdr"><div><div class="site-nm">${s.site}</div></div><div class="site-laps">${s.laps}<i>laps</i></div></div>
      <div class="site-meta"><span>${s.members} salespeople</span><span>Avg ${s.avg}</span>${s.fj ? `<span class="hl">${s.fj} full journey${s.fj>1?'s':''}</span>` : ''}</div>
      <div style="font-size:12px;color:var(--muted)">Top: <strong style="color:var(--text)">${top?.name || '—'}</strong></div>
      <div class="site-bar"><div class="site-bar-f" style="width:${pct}%"></div></div></div>`;
  }); h += `</div>`;

  // ── CUSTOMER JOURNEYS ──
  if (jy.length) {
    h += `<div class="stitle">Customer Journeys</div><div class="jny">`;
    jy.slice(0, 25).forEach(j => {
      const sc = j.pct === 100 ? "full" : "part"; const lab = j.pct === 100 ? `✓ +${FJB}` : j.pct + "%";
      h += `<div class="jr"><div class="jr-cust"><div class="jr-cn">${j.name}</div><div class="jr-cid">${j.id}</div><div class="jr-cm">${j.sp} · ${j.site}${j.veh ? ' · ' + j.veh : ''}</div></div><div class="jr-pips">`;
      ALL_ACT.forEach(a => { const d = j.acts.includes(a); h += `<div class="jr-pip ${d?'dn':''}" title="${a}"><span class="ico">${AI[a]}</span></div>`; });
      h += `</div><div class="jr-st ${sc}">${lab}</div></div>`;
    }); h += `</div>`;
  }

  // ── LIVE FEED (actual entries from sheet) ──
  h += `<div class="stitle">Activity Feed</div><div class="feed">`;
  if (!feedItems.length) h += `<div class="empty">No entries yet</div>`;
  else feedItems.forEach(f => {
    h += `<div class="fi"><div class="fi-ico">${AI[f.act] || "•"}</div>
      <div class="fi-txt"><strong>${f.sp}</strong> logged <strong>${f.act}</strong> for ${f.customer} (${f.cid})${f.veh ? ' — ' + f.veh : ''}${f.bonus > 0 ? ' 🏆 +' + f.bonus + ' bonus!' : ''}</div>
      <div class="fi-time">${f.time}</div></div>`;
  }); h += `</div>`;

  // ── MD DASHBOARD ──
  h += `<div class="md-banner"><div class="md-banner-icon">📊</div><div class="md-banner-text"><h3>MD Dashboard</h3><p>Management overview. Daily email sent every morning.</p></div></div>`;
  h += `<div class="md-grid"><div class="md-c"><h4>Overview</h4>
    <div class="md-r"><span class="l">Total Laps</span><span class="v">${totL}</span></div>
    <div class="md-r"><span class="l">Salespeople</span><span class="v">${totP}</span></div>
    <div class="md-r"><span class="l">Avg / Person</span><span class="v">${(totL/totP).toFixed(1)}</span></div>
    <div class="md-r"><span class="l">Leader Gap</span><span class="v">${lb.length>1?lb[0].laps-lb[1].laps:0}</span></div>
    <div class="md-r"><span class="l">Full Journeys</span><span class="v">${totFJ}</span></div>
    <div class="md-r"><span class="l">Bonus Laps</span><span class="v">${totFJ*FJB}</span></div></div>`;
  h += `<div class="md-c"><h4>Site Rankings</h4>`;
  sites.forEach((s, i) => { h += `<div class="md-r"><span class="l">${i+1}. ${s.site}</span><span class="v">${s.laps} (${s.avg} avg)</span></div>`; });
  h += `</div><div class="md-c"><h4>Points System</h4>
    <div class="md-r"><span class="l">🚗 New Car Order</span><span class="v">5 laps</span></div>
    <div class="md-r"><span class="l">🏎️ Test Drive</span><span class="v">2 laps</span></div>
    <div class="md-r"><span class="l">🔄 Part Exchange</span><span class="v">2 laps</span></div>
    <div class="md-r"><span class="l">📅 Appointment</span><span class="v">1 lap</span></div>
    <div class="md-r"><span class="l">💰 Finance Proposal</span><span class="v">1 lap</span></div>
    <div class="md-r"><span class="l">🎯 Full Journey</span><span class="v" style="color:var(--green)">${FJB} laps</span></div></div></div>`;

  app.innerHTML = h;
}

async function update() {
  try {
    const data = await fetchData();
    render(data);
  } catch (e) {
    console.error("Fetch error:", e);
    // Only show error if app is still in loading state (first load)
    // On subsequent refreshes, keep showing stale data
    const app = document.getElementById("app");
    if (app.querySelector(".loading")) {
      app.innerHTML = `<div class="error-card"><div class="ei">⚠️</div><div class="et">Could not load data</div>
        <div class="em">${e.message}</div>
        <button class="retry-btn" onclick="location.reload()">Retry</button></div>`;
    }
  }
}

update();
setInterval(update, 30000);
</script>
</body>
</html>
