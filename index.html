<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Pole Position Elite — Hyundai Championship</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#e60023;--red-light:#fff0f2;--red-mid:#ffc9c9;
  --gold:#f59f00;--gold-bg:#fff9db;--silver:#868e96;--silver-bg:#f1f3f5;--bronze:#d9480f;--bronze-bg:#fff4e6;
  --bg:#f4f6f9;--white:#fff;--card:#fff;--border:#e8eaed;
  --text:#1a1a2e;--muted:#868e96;--dark:#343a40;
  --green:#00c853;--green-bg:#edfff4;--blue:#1971c2;--blue-bg:#e7f5ff;--amber:#f59f00;--amber-bg:#fff9db;
  --font-display:'Plus Jakarta Sans',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 4px 12px rgba(0,0,0,.08);
}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh}

.header{background:var(--white);border-bottom:3px solid var(--red);position:sticky;top:0;z-index:100}
.header-inner{max-width:1400px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:44px;height:44px;background:var(--red);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;box-shadow:0 2px 8px rgba(230,0,35,.25)}
.logo-text{font-family:var(--font-display);font-size:clamp(18px,3vw,26px);font-weight:800;color:var(--red)}
.logo-sub{font-size:12px;font-weight:500;color:var(--muted);letter-spacing:1px}
.header-right{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.live-badge{display:flex;align-items:center;gap:6px;background:var(--red-light);border:1px solid var(--red-mid);border-radius:100px;padding:6px 14px;font-weight:600;font-size:12px;color:var(--red)}
.live-dot{width:7px;height:7px;background:var(--red);border-radius:50%;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(230,0,35,.4)}50%{box-shadow:0 0 0 6px rgba(230,0,35,0)}}
.demo-badge{background:var(--blue-bg);border:1px solid #a5d8ff;border-radius:100px;padding:5px 12px;font-size:11px;font-weight:600;color:var(--blue)}

.main{max-width:1400px;margin:0 auto;padding:24px 24px 60px}
.stitle{font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.stitle::after{content:'';flex:1;height:1px;background:var(--border)}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:28px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s}
.stat:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px}
.stat-value{font-family:var(--font-display);font-size:32px;font-weight:800;color:var(--text)}
.stat-sub{font-size:12px;color:var(--muted);margin-top:2px}

.podium{display:flex;align-items:flex-end;justify-content:center;gap:14px;padding:10px 0 0;margin-bottom:28px}
.pp{text-align:center;border-radius:16px 16px 0 0;padding:20px 16px;transition:transform .3s;box-shadow:var(--shadow)}
.pp:hover{transform:translateY(-4px)}
.pp.first{order:2;background:var(--gold-bg);border:2px solid #ffe066;min-height:200px;flex:1.2}
.pp.second{order:1;background:var(--silver-bg);border:2px solid #dee2e6;min-height:170px;flex:1}
.pp.third{order:3;background:var(--bronze-bg);border:2px solid #ffc078;min-height:150px;flex:1}
.pp-rank{font-family:var(--font-display);font-size:44px;font-weight:800;opacity:.2}
.pp.first .pp-rank{color:var(--gold)}.pp.second .pp-rank{color:var(--silver)}.pp.third .pp-rank{color:var(--bronze)}
.pp-name{font-family:var(--font-display);font-size:clamp(14px,2.5vw,20px);font-weight:800;color:var(--text);margin-top:4px}
.pp-site{font-size:12px;font-weight:500;color:var(--muted);margin-top:4px}
.pp-laps{font-family:var(--font-display);font-size:clamp(24px,4vw,36px);font-weight:800;margin-top:8px}
.pp.first .pp-laps{color:var(--gold)}.pp.second .pp-laps{color:var(--silver)}.pp.third .pp-laps{color:var(--bronze)}
.pp-laps span{font-size:13px;font-weight:500;color:var(--muted);margin-left:4px}

.track{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:28px;box-shadow:var(--shadow);overflow:hidden;position:relative}
.track::before{content:'';position:absolute;top:0;left:0;bottom:0;width:4px;background:var(--red)}
.tr{display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid #f1f3f5}
.tr:last-child{border-bottom:none}
.tr-pos{font-family:var(--font-display);font-size:18px;font-weight:800;width:30px;text-align:center;color:var(--muted)}
.tr-pos.p1{color:var(--gold)}.tr-pos.p2{color:var(--silver)}.tr-pos.p3{color:var(--bronze)}
.tr-drv{flex:1;min-width:0}
.tr-nm{font-weight:600;font-size:14px;color:var(--text)}
.tr-site{font-size:11px;color:var(--muted);font-weight:500}
.tr-bar-w{flex:2;height:28px;background:#f1f3f5;border-radius:6px;overflow:hidden}
.tr-bar{height:100%;border-radius:6px;transition:width 1.2s cubic-bezier(.22,1,.36,1);display:flex;align-items:center;justify-content:flex-end;padding-right:10px;min-width:40px}
.tr-bar.p1{background:linear-gradient(90deg,#ff6b6b,var(--red))}.tr-bar.p2{background:linear-gradient(90deg,#ff8787,#ff6b6b)}.tr-bar.p3{background:linear-gradient(90deg,#ffa8a8,#ff8787)}.tr-bar.ot{background:linear-gradient(90deg,#ffc9c9,#ffa8a8)}
.tr-bar em{font-family:var(--font-display);font-size:12px;font-weight:700;color:#fff;font-style:normal;text-shadow:0 1px 2px rgba(0,0,0,.15)}

.sites-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:28px}
.site-c{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow);transition:all .2s}
.site-c:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.site-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.site-nm{font-family:var(--font-display);font-size:16px;font-weight:800;color:var(--text)}
.site-laps{font-family:var(--font-display);font-size:24px;font-weight:800;color:var(--red)}
.site-laps i{font-size:11px;color:var(--muted);font-weight:400;font-style:normal;margin-left:2px}
.site-meta{font-size:12px;color:var(--muted);font-weight:500;display:flex;gap:14px;margin-bottom:8px}
.site-meta .hl{color:var(--green);font-weight:600}
.site-bar{height:5px;background:#f1f3f5;border-radius:3px;margin-top:10px;overflow:hidden}
.site-bar-f{height:100%;background:linear-gradient(90deg,#ff6b6b,var(--red));border-radius:3px;transition:width 1s ease}

.jny{background:var(--card);border:1px solid var(--border);border-radius:14px;margin-bottom:28px;box-shadow:var(--shadow);overflow:hidden}
.jr{display:flex;align-items:center;gap:12px;padding:14px 18px;border-bottom:1px solid #f1f3f5}
.jr:last-child{border-bottom:none}
.jr-cust{flex:1;min-width:0}
.jr-cn{font-weight:600;font-size:14px;color:var(--text)}
.jr-cid{font-size:12px;font-weight:700;color:var(--red);letter-spacing:1px}
.jr-cm{font-size:11px;color:var(--muted);font-weight:500}
.jr-pips{display:flex;gap:4px;flex-shrink:0}
.jr-pip{width:30px;height:30px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;background:#f1f3f5;border:2px solid #e8eaed}
.jr-pip.dn{background:var(--green-bg);border-color:#b2f2bb}
.jr-pip .ico{opacity:.3}.jr-pip.dn .ico{opacity:1}
.jr-st{font-size:11px;font-weight:700;padding:5px 12px;border-radius:100px;flex-shrink:0}
.jr-st.full{background:var(--green-bg);border:1px solid #b2f2bb;color:var(--green)}
.jr-st.part{background:#f1f3f5;border:1px solid #dee2e6;color:var(--muted)}

.feed{background:var(--card);border:1px solid var(--border);border-radius:14px;max-height:280px;overflow-y:auto;margin-bottom:28px;box-shadow:var(--shadow);scrollbar-width:thin;scrollbar-color:#dee2e6 transparent}
.feed::-webkit-scrollbar{width:6px}.feed::-webkit-scrollbar-thumb{background:#dee2e6;border-radius:3px}
.fi{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid #f8f9fa;animation:fin .4s ease}
.fi:last-child{border-bottom:none}
@keyframes fin{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.fi-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
.fi-dot.a{background:var(--red)}.fi-dot.b{background:var(--green)}.fi-dot.j{background:var(--amber)}
.fi-txt{font-size:13px;color:var(--dark);flex:1}.fi-txt strong{color:var(--text);font-weight:600}
.fi-time{font-size:11px;color:var(--muted);font-weight:500;flex-shrink:0}

/* ── MD DASHBOARD ── highlighted with red accent border */
.md-banner{background:var(--red-light);border:2px solid var(--red-mid);border-radius:14px;padding:18px 24px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.md-banner-icon{font-size:28px}
.md-banner-text h3{font-family:var(--font-display);font-size:16px;font-weight:800;color:var(--red)}
.md-banner-text p{font-size:12px;color:var(--muted);margin-top:2px}
.md-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:28px}
.md-c{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;box-shadow:var(--shadow)}
.md-c h4{font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.md-r{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f8f9fa;font-size:13px}
.md-r:last-child{border-bottom:none}
.md-r .l{color:var(--muted);font-weight:500}.md-r .v{font-weight:700;color:var(--text)}

.config-banner{background:var(--blue-bg);border:2px dashed #a5d8ff;border-radius:14px;padding:28px;margin-bottom:28px;text-align:center}
.config-banner h3{font-family:var(--font-display);font-size:18px;font-weight:800;color:var(--blue);margin-bottom:8px}
.config-banner p{font-size:13px;color:var(--muted);max-width:580px;margin:0 auto 16px}
.config-banner code{background:#dbe4ff;padding:2px 8px;border-radius:4px;font-size:12px;color:var(--blue)}
.ci{background:#fff;border:2px solid var(--border);border-radius:8px;padding:10px 16px;color:var(--text);font-size:14px;width:100%;max-width:520px;margin-bottom:10px;font-family:var(--font-body)}
.ci:focus{outline:none;border-color:var(--red)}
.cb{background:var(--red);color:#fff;border:none;border-radius:8px;padding:10px 28px;font-family:var(--font-display);font-weight:700;font-size:14px;letter-spacing:1px;cursor:pointer;transition:all .2s}
.cb:hover{background:#cc001f;transform:translateY(-1px)}
.cb.sec{background:transparent;border:1px solid var(--border);color:var(--muted);font-size:11px;padding:6px 14px}
.cb.sec:hover{border-color:var(--red);color:var(--red)}

.footer{text-align:center;padding:30px 24px;border-top:1px solid var(--border);background:var(--white);font-size:12px;color:var(--muted);font-weight:500}
.footer a{color:var(--red);text-decoration:none;font-weight:600}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;gap:20px}
.spinner{width:44px;height:44px;border:3px solid #e8eaed;border-top-color:var(--red);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;font-weight:600;color:var(--muted);letter-spacing:1px}
.empty{padding:24px;text-align:center;color:var(--muted);font-size:13px}

@media(max-width:768px){
  .header-inner{flex-direction:column;text-align:center}
  .podium{gap:8px}.pp{flex:1!important;padding:14px 10px}
  .tr{flex-wrap:wrap}.tr-bar-w{flex-basis:100%;order:3}
  .sites-grid{grid-template-columns:1fr}
  .jr-pips{gap:2px}.jr-pip{width:24px;height:24px;font-size:11px}
}
</style>
</head>
<body>

<div class="header"><div class="header-inner">
  <div class="logo">
    <div class="logo-icon">🏁</div>
    <div><div class="logo-text">Pole Position Elite</div><div class="logo-sub">Hyundai Championship</div></div>
  </div>
  <div class="header-right"><div class="live-badge"><span class="live-dot"></span> Live</div><div id="modeBadge"></div></div>
</div></div>

<div class="main" id="app"><div class="loading" id="loadingState"><div class="spinner"></div><div class="loading-text">Loading championship data…</div></div></div>

<div class="footer">Pole Position Elite &mdash; Hyundai Dealership Network &mdash; <a href="#" id="formLink" target="_blank">Submit Entry</a> &mdash; Refreshes every 30s</div>

<script>
const CSV_URL=localStorage.getItem('polepos_csv')||'';
const FORM_URL=localStorage.getItem('polepos_form')||'';
const PTS={"New Car Order":5,"Test Drive":2,"Part Exchange":2,"Appointment Booked":1,"Finance Proposal":1};
const ALL_ACT=Object.keys(PTS);
const FJB=5;
const SITES=["Boston","Kings Lynn","Lincoln","Worksop","Burton"];
const AI={"New Car Order":"🚗","Appointment Booked":"📅","Test Drive":"🏎️","Finance Proposal":"💰","Part Exchange":"🔄"};

// ── DEMO DATA (generated ONCE, then stable) ──
let stableDemoData=null;
function getDemoData(){
  if(stableDemoData)return stableDemoData;
  const ppl=[{n:"James Carter",s:"Boston"},{n:"Sophie Williams",s:"Kings Lynn"},{n:"Marcus Chen",s:"Lincoln"},{n:"Emma Thompson",s:"Worksop"},{n:"Liam O'Brien",s:"Burton"},{n:"Olivia Hughes",s:"Boston"},{n:"Noah Patel",s:"Kings Lynn"},{n:"Ava Mitchell",s:"Lincoln"},{n:"Ethan Brooks",s:"Worksop"},{n:"Mia Foster",s:"Burton"},{n:"Jack Reynolds",s:"Boston"},{n:"Charlotte Davis",s:"Lincoln"},{n:"Harry Wilson",s:"Kings Lynn"},{n:"Isla Martin",s:"Burton"},{n:"George Taylor",s:"Worksop"}];
  const cust=["Mr Smith","Mrs Jones","Mr Patel","Ms Green","Mr Brown","Mrs Lee","Mr Wilson","Ms Clark","Mr Taylor","Mrs White","Mr Harris","Ms Robinson"];
  const vehs=["Tucson","Kona","i20","IONIQ 5","i30","Bayon","Santa Fe"];
  const rows=[];let cc={};
  ppl.forEach(p=>{const nc=2+Math.floor(Math.random()*3);const sc=[...cust].sort(()=>Math.random()-.5).slice(0,nc);
    sc.forEach(c=>{const ini=(p.n.split(' ')[0][0]+p.n.split(' ').pop()[0]).toUpperCase();if(!cc[ini])cc[ini]=0;cc[ini]++;const cid=ini+'-'+String(cc[ini]).padStart(4,'0');
      const na=1+Math.floor(Math.random()*5);[...ALL_ACT].sort(()=>Math.random()-.5).slice(0,na).forEach(a=>{rows.push({sp:p.n,site:p.s,act:a,cid:cid,cn:c,veh:vehs[Math.floor(Math.random()*vehs.length)]})})})});
  const pplM={},jM={};
  rows.forEach(r=>{if(!jM[r.cid])jM[r.cid]={id:r.cid,cn:r.cn,sp:r.sp,site:r.site,veh:r.veh,acts:new Set(),laps:0};
    if(!jM[r.cid].acts.has(r.act)){jM[r.cid].acts.add(r.act);jM[r.cid].laps+=PTS[r.act]||0}});
  Object.values(jM).forEach(j=>{j.bonus=j.acts.size===ALL_ACT.length;
    if(!pplM[j.sp])pplM[j.sp]={site:j.site,laps:0};pplM[j.sp].laps+=j.laps+(j.bonus?FJB:0)});
  const lb=Object.entries(pplM).map(([n,i])=>({name:n,site:i.site,laps:i.laps})).sort((a,b)=>b.laps-a.laps);
  const jy=Object.values(jM).map(j=>({id:j.id,cn:j.cn,sp:j.sp,site:j.site,veh:j.veh,acts:Array.from(j.acts),pct:Math.round(j.acts.size/ALL_ACT.length*100),laps:j.laps,bonus:j.bonus?FJB:0})).sort((a,b)=>b.pct-a.pct||b.laps-a.laps);
  stableDemoData={leaderboard:lb,journeys:jy};
  return stableDemoData;
}

let prevLB=[],feed=[],isDemo=false;

async function fetchData(){
  if(!CSV_URL){isDemo=true;return getDemoData()}
  isDemo=false;
  try{const r=await fetch(CSV_URL);const t=await r.text();
    const lb=t.split("\n").slice(1).map(r=>{const c=r.split(",");return{name:(c[0]||'').trim(),site:(c[1]||'').trim(),laps:parseInt(c[2])||0}}).filter(r=>r.name);
    return{leaderboard:lb,journeys:[]}}
  catch(e){console.error(e);isDemo=true;return getDemoData()}
}

function render(data){
  const{leaderboard:lb,journeys:jy}=data;
  const maxL=lb[0]?.laps||1,totL=lb.reduce((s,d)=>s+d.laps,0),totP=lb.length;
  const totFJ=jy.filter(j=>j.pct===100).length,totC=jy.length;
  const sd={};SITES.forEach(s=>sd[s]={laps:0,m:0,fj:0});
  lb.forEach(d=>{if(sd[d.site]!==undefined){sd[d.site].laps+=d.laps;sd[d.site].m++}});
  jy.filter(j=>j.pct===100).forEach(j=>{if(sd[j.site])sd[j.site].fj++});
  const maxSL=Math.max(...Object.values(sd).map(s=>s.laps),1);
  if(prevLB.length){lb.forEach(d=>{const p=prevLB.find(x=>x.name===d.name);if(p&&d.laps>p.laps)feed.unshift({t:'a',txt:`<strong>${d.name}</strong> earned <strong>+${d.laps-p.laps}</strong> laps`,tm:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})})});feed=feed.slice(0,50)}
  document.getElementById('modeBadge').innerHTML=isDemo?'<span class="demo-badge">⚡ Demo</span>':'';
  if(FORM_URL)document.getElementById('formLink').href=FORM_URL;
  const app=document.getElementById('app');let h='';

  if(!CSV_URL){h+=`<div class="config-banner"><h3>🔧 Connect Your Google Sheet</h3><p>Showing demo data. Paste the published CSV URL from your <code>Leaderboard</code> tab below.</p>
    <input type="text" class="ci" id="csvIn" placeholder="https://docs.google.com/spreadsheets/d/.../pub?output=csv"/><br/>
    <input type="text" class="ci" id="frmIn" placeholder="Apps Script web app URL (entry form — optional)"/><br/>
    <button class="cb" onclick="saveConf()">Connect &amp; Go Live</button></div>`}
  else{h+=`<div style="text-align:right;margin-bottom:12px"><button class="cb sec" onclick="if(confirm('Disconnect and show demo?')){localStorage.removeItem('polepos_csv');localStorage.removeItem('polepos_form');location.reload()}">Disconnect</button></div>`}

  // Stats
  h+=`<div class="stats-row">
    <div class="stat"><div class="stat-label">Total Laps</div><div class="stat-value">${totL.toLocaleString()}</div><div class="stat-sub">All sites combined</div></div>
    <div class="stat"><div class="stat-label">Salespeople</div><div class="stat-value">${totP}</div><div class="stat-sub">${SITES.length} dealerships</div></div>
    <div class="stat"><div class="stat-label">Leader</div><div class="stat-value">${lb[0]?.laps||0}</div><div class="stat-sub">${lb[0]?.name||'—'}</div></div>
    <div class="stat"><div class="stat-label">Customers</div><div class="stat-value">${totC||'—'}</div><div class="stat-sub">${totFJ} full journeys</div></div>
    <div class="stat"><div class="stat-label">Bonus Laps</div><div class="stat-value">${totFJ*FJB}</div><div class="stat-sub">${FJB} per full journey</div></div>
  </div>`;

  // Podium
  h+=`<div class="stitle">Championship Podium</div><div class="podium">`;
  lb.slice(0,3).forEach((d,i)=>{const c=['first','second','third'][i];h+=`<div class="pp ${c}"><div class="pp-rank">${i+1}</div><div class="pp-name">${d.name}</div><div class="pp-site">${d.site}</div><div class="pp-laps">${d.laps}<span>laps</span></div></div>`});
  h+=`</div>`;

  // Positions
  h+=`<div class="stitle">Race Positions</div><div class="track">`;
  lb.slice(0,15).forEach((d,i)=>{const pct=Math.max(d.laps/maxL*100,8);const pc=i<3?`p${i+1}`:'';const bc=i<3?`p${i+1}`:'ot';
    h+=`<div class="tr"><div class="tr-pos ${pc}">${i+1}</div><div class="tr-drv"><div class="tr-nm">${d.name}</div><div class="tr-site">${d.site}</div></div><div class="tr-bar-w"><div class="tr-bar ${bc}" style="width:${pct}%"><em>${d.laps}</em></div></div></div>`});
  h+=`</div>`;

  // Sites
  const ss=Object.entries(sd).sort((a,b)=>b[1].laps-a[1].laps);
  h+=`<div class="stitle">Site Performance</div><div class="sites-grid">`;
  ss.forEach(([n,info])=>{const pct=info.laps/maxSL*100;const avg=info.m?(info.laps/info.m).toFixed(1):0;const top=lb.find(d=>d.site===n);
    h+=`<div class="site-c"><div class="site-hdr"><div><div class="site-nm">${n}</div></div><div class="site-laps">${info.laps}<i>laps</i></div></div>
    <div class="site-meta"><span>${info.m} salespeople</span><span>Avg ${avg}</span>${info.fj?`<span class="hl">${info.fj} full journey${info.fj>1?'s':''}</span>`:''}</div>
    <div style="font-size:12px;color:var(--muted)">Top: <span style="color:var(--text);font-weight:600">${top?.name||'—'}</span></div>
    <div class="site-bar"><div class="site-bar-f" style="width:${pct}%"></div></div></div>`});
  h+=`</div>`;

  // Journeys
  if(jy.length){h+=`<div class="stitle">Customer Journeys</div><div class="jny">`;
    jy.slice(0,20).forEach(j=>{const sc=j.pct===100?'full':'part';const lab=j.pct===100?`✓ +${FJB}`:j.pct+'%';
      h+=`<div class="jr"><div class="jr-cust"><div class="jr-cn">${j.cn}</div>${j.id?`<div class="jr-cid">${j.id}</div>`:''}<div class="jr-cm">${j.sp} · ${j.site}${j.veh?' · '+j.veh:''}</div></div><div class="jr-pips">`;
      ALL_ACT.forEach(a=>{const d=j.acts.includes(a);h+=`<div class="jr-pip ${d?'dn':''}" title="${a}"><span class="ico">${AI[a]}</span></div>`});
      h+=`</div><div class="jr-st ${sc}">${lab}</div></div>`});
    h+=`</div>`}

  // Feed
  h+=`<div class="stitle">Live Activity Feed</div><div class="feed">`;
  if(!feed.length)h+=`<div class="empty">Waiting for updates…</div>`;
  else feed.forEach(f=>{h+=`<div class="fi"><div class="fi-dot ${f.t}"></div><div class="fi-txt">${f.txt}</div><div class="fi-time">${f.tm}</div></div>`});
  h+=`</div>`;

  // ── MD DASHBOARD — clearly labelled ──
  h+=`<div class="md-banner"><div class="md-banner-icon">📊</div><div class="md-banner-text"><h3>MD Dashboard</h3><p>Management reporting overview. A daily email with this data is sent automatically every morning.</p></div></div>`;
  h+=`<div class="md-grid">`;
  h+=`<div class="md-c"><h4>Championship Overview</h4>
    <div class="md-r"><span class="l">Total Laps</span><span class="v">${totL}</span></div>
    <div class="md-r"><span class="l">Active Salespeople</span><span class="v">${totP}</span></div>
    <div class="md-r"><span class="l">Avg Laps / Person</span><span class="v">${totP?(totL/totP).toFixed(1):0}</span></div>
    <div class="md-r"><span class="l">Leader Gap</span><span class="v">${lb.length>1?lb[0].laps-lb[1].laps:0} laps</span></div>
    <div class="md-r"><span class="l">Full Journeys</span><span class="v">${totFJ}</span></div>
    <div class="md-r"><span class="l">Bonus Laps</span><span class="v">${totFJ*FJB}</span></div></div>`;
  h+=`<div class="md-c"><h4>Site Rankings</h4>`;
  ss.forEach(([n,info],i)=>{const avg=info.m?(info.laps/info.m).toFixed(1):0;h+=`<div class="md-r"><span class="l">${i+1}. ${n}</span><span class="v">${info.laps} laps (${avg} avg)</span></div>`});
  h+=`</div><div class="md-c"><h4>Points System</h4>
    <div class="md-r"><span class="l">🚗 New Car Order</span><span class="v">5 laps</span></div>
    <div class="md-r"><span class="l">🏎️ Test Drive</span><span class="v">2 laps</span></div>
    <div class="md-r"><span class="l">🔄 Part Exchange</span><span class="v">2 laps</span></div>
    <div class="md-r"><span class="l">📅 Appointment Booked</span><span class="v">1 lap</span></div>
    <div class="md-r"><span class="l">💰 Finance Proposal</span><span class="v">1 lap</span></div>
    <div class="md-r"><span class="l">🎯 Full Journey Bonus</span><span class="v" style="color:var(--green)">${FJB} laps</span></div></div></div>`;

  app.innerHTML=h;prevLB=JSON.parse(JSON.stringify(lb));
}

function saveConf(){const c=document.getElementById('csvIn')?.value?.trim();const f=document.getElementById('frmIn')?.value?.trim();if(c){localStorage.setItem('polepos_csv',c);if(f)localStorage.setItem('polepos_form',f);location.reload()}}

async function update(){try{const d=await fetchData();document.getElementById('loadingState')?.remove();render(d)}catch(e){console.error(e)}}
update();setInterval(update,30000);

// Demo feed — stable, doesn't regenerate data
if(!CSV_URL){setInterval(()=>{if(isDemo&&stableDemoData){const lb=stableDemoData.leaderboard;if(lb.length){const p=lb[Math.floor(Math.random()*lb.length)];const g=Math.floor(Math.random()*3)+1;p.laps+=g;lb.sort((a,b)=>b.laps-a.laps);
  const ts=['a','b','j'],t=ts[Math.floor(Math.random()*ts.length)];
  const ms={a:`<strong>${p.name}</strong> logged a <strong>${ALL_ACT[Math.floor(Math.random()*ALL_ACT.length)]}</strong>`,b:`<strong>${p.name}</strong> completed a full journey! <strong>+${FJB} bonus</strong>`,j:`<strong>${p.name}</strong> started with a new customer`};
  feed.unshift({t,txt:ms[t],tm:new Date().toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})});feed=feed.slice(0,50);render(stableDemoData)}}},7000)}
</script>
</body>
</html>
