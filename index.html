<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Pole Position Elite — Hyundai Championship</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --red:#e60023;--red-light:#fff0f2;--red-mid:#ffc9c9;
  --gold:#f59f00;--gold-bg:#fff9db;--silver:#868e96;--silver-bg:#f1f3f5;--bronze:#d9480f;--bronze-bg:#fff4e6;
  --bg:#f4f6f9;--white:#fff;--card:#fff;--border:#e8eaed;
  --text:#1a1a2e;--muted:#868e96;--dark:#343a40;
  --green:#00c853;--green-bg:#edfff4;--blue:#1971c2;--blue-bg:#e7f5ff;--amber:#f59f00;
  --font-display:'Plus Jakarta Sans',sans-serif;
  --font-body:'DM Sans',sans-serif;
  --shadow:0 1px 3px rgba(0,0,0,.06),0 1px 2px rgba(0,0,0,.04);
  --shadow-lg:0 4px 12px rgba(0,0,0,.08);
}
body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh}

.header{background:var(--white);border-bottom:3px solid var(--red);position:sticky;top:0;z-index:100}
.header-inner{max-width:1400px;margin:0 auto;padding:14px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:12px}
.logo{display:flex;align-items:center;gap:12px}
.logo-icon{width:44px;height:44px;background:var(--red);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:22px;color:#fff;box-shadow:0 2px 8px rgba(230,0,35,.25)}
.logo-text{font-family:var(--font-display);font-size:clamp(18px,3vw,26px);font-weight:800;color:var(--red)}
.logo-sub{font-size:12px;font-weight:500;color:var(--muted);letter-spacing:1px}
.header-right{display:flex;align-items:center;gap:10px}
.live-badge{display:flex;align-items:center;gap:6px;background:var(--red-light);border:1px solid var(--red-mid);border-radius:100px;padding:6px 14px;font-weight:600;font-size:12px;color:var(--red)}
.live-dot{width:7px;height:7px;background:var(--red);border-radius:50%;animation:pulse 1.5s ease-in-out infinite}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(230,0,35,.4)}50%{box-shadow:0 0 0 6px rgba(230,0,35,0)}}
.refresh-info{font-size:11px;color:var(--muted);font-weight:500}

.main{max-width:1400px;margin:0 auto;padding:24px 24px 60px}
.stitle{font-family:var(--font-display);font-size:14px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:14px;display:flex;align-items:center;gap:10px}
.stitle::after{content:'';flex:1;height:1px;background:var(--border)}

.stats-row{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px;margin-bottom:28px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow);transition:transform .2s,box-shadow .2s}
.stat:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.stat-label{font-size:11px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:6px}
.stat-value{font-family:var(--font-display);font-size:32px;font-weight:800;color:var(--text)}
.stat-sub{font-size:12px;color:var(--muted);margin-top:2px}

.podium{display:flex;align-items:flex-end;justify-content:center;gap:14px;padding:10px 0 0;margin-bottom:28px}
.pp{text-align:center;border-radius:16px 16px 0 0;padding:20px 16px;transition:transform .3s;box-shadow:var(--shadow)}
.pp:hover{transform:translateY(-4px)}
.pp.first{order:2;background:var(--gold-bg);border:2px solid #ffe066;min-height:200px;flex:1.2}
.pp.second{order:1;background:var(--silver-bg);border:2px solid #dee2e6;min-height:170px;flex:1}
.pp.third{order:3;background:var(--bronze-bg);border:2px solid #ffc078;min-height:150px;flex:1}
.pp-rank{font-family:var(--font-display);font-size:44px;font-weight:800;opacity:.2}
.pp.first .pp-rank{color:var(--gold)}.pp.second .pp-rank{color:var(--silver)}.pp.third .pp-rank{color:var(--bronze)}
.pp-name{font-family:var(--font-display);font-size:clamp(14px,2.5vw,20px);font-weight:800;color:var(--text);margin-top:4px}
.pp-site{font-size:12px;font-weight:500;color:var(--muted);margin-top:4px}
.pp-laps{font-family:var(--font-display);font-size:clamp(24px,4vw,36px);font-weight:800;margin-top:8px}
.pp.first .pp-laps{color:var(--gold)}.pp.second .pp-laps{color:var(--silver)}.pp.third .pp-laps{color:var(--bronze)}
.pp-laps span{font-size:13px;font-weight:500;color:var(--muted);margin-left:4px}

.track{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:28px;box-shadow:var(--shadow);overflow:hidden;position:relative}
.track::before{content:'';position:absolute;top:0;left:0;bottom:0;width:4px;background:var(--red)}
.tr{display:flex;align-items:center;gap:14px;padding:10px 0;border-bottom:1px solid #f1f3f5}
.tr:last-child{border-bottom:none}
.tr-pos{font-family:var(--font-display);font-size:18px;font-weight:800;width:30px;text-align:center;color:var(--muted)}
.tr-pos.p1{color:var(--gold)}.tr-pos.p2{color:var(--silver)}.tr-pos.p3{color:var(--bronze)}
.tr-drv{flex:1;min-width:0}
.tr-nm{font-weight:600;font-size:14px;color:var(--text)}
.tr-site{font-size:11px;color:var(--muted);font-weight:500}
.tr-bar-w{flex:2;height:28px;background:#f1f3f5;border-radius:6px;overflow:hidden}
.tr-bar{height:100%;border-radius:6px;transition:width 1.2s cubic-bezier(.22,1,.36,1);display:flex;align-items:center;justify-content:flex-end;padding-right:10px;min-width:40px}
.tr-bar.p1{background:linear-gradient(90deg,#ff6b6b,var(--red))}.tr-bar.p2{background:linear-gradient(90deg,#ff8787,#ff6b6b)}.tr-bar.p3{background:linear-gradient(90deg,#ffa8a8,#ff8787)}.tr-bar.ot{background:linear-gradient(90deg,#ffc9c9,#ffa8a8)}
.tr-bar em{font-family:var(--font-display);font-size:12px;font-weight:700;color:#fff;font-style:normal;text-shadow:0 1px 2px rgba(0,0,0,.15)}

.sites-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(240px,1fr));gap:12px;margin-bottom:28px}
.site-c{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:18px 20px;box-shadow:var(--shadow);transition:all .2s}
.site-c:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.site-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.site-nm{font-family:var(--font-display);font-size:16px;font-weight:800;color:var(--text)}
.site-laps{font-family:var(--font-display);font-size:24px;font-weight:800;color:var(--red)}
.site-laps i{font-size:11px;color:var(--muted);font-weight:400;font-style:normal;margin-left:2px}
.site-meta{font-size:12px;color:var(--muted);font-weight:500;display:flex;gap:14px;margin-bottom:8px}
.site-meta .hl{color:var(--green);font-weight:600}
.site-bar{height:5px;background:#f1f3f5;border-radius:3px;margin-top:10px;overflow:hidden}
.site-bar-f{height:100%;background:linear-gradient(90deg,#ff6b6b,var(--red));border-radius:3px;transition:width 1s ease}

.feed{background:var(--card);border:1px solid var(--border);border-radius:14px;max-height:280px;overflow-y:auto;margin-bottom:28px;box-shadow:var(--shadow);scrollbar-width:thin;scrollbar-color:#dee2e6 transparent}
.feed::-webkit-scrollbar{width:6px}.feed::-webkit-scrollbar-thumb{background:#dee2e6;border-radius:3px}
.fi{display:flex;align-items:center;gap:12px;padding:12px 18px;border-bottom:1px solid #f8f9fa;animation:fin .4s ease}
.fi:last-child{border-bottom:none}
@keyframes fin{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
.fi-dot{width:7px;height:7px;border-radius:50%;flex-shrink:0;background:var(--red)}
.fi-txt{font-size:13px;color:var(--dark);flex:1}.fi-txt strong{color:var(--text);font-weight:600}
.fi-time{font-size:11px;color:var(--muted);font-weight:500;flex-shrink:0}

.md-banner{background:var(--red-light);border:2px solid var(--red-mid);border-radius:14px;padding:18px 24px;margin-bottom:16px;display:flex;align-items:center;gap:12px}
.md-banner-icon{font-size:28px}
.md-banner-text h3{font-family:var(--font-display);font-size:16px;font-weight:800;color:var(--red)}
.md-banner-text p{font-size:12px;color:var(--muted);margin-top:2px}
.md-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:12px;margin-bottom:28px}
.md-c{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:20px;box-shadow:var(--shadow)}
.md-c h4{font-family:var(--font-display);font-size:13px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin-bottom:14px}
.md-r{display:flex;justify-content:space-between;padding:7px 0;border-bottom:1px solid #f8f9fa;font-size:13px}
.md-r:last-child{border-bottom:none}
.md-r .l{color:var(--muted);font-weight:500}.md-r .v{font-weight:700;color:var(--text)}

.error-card{background:#fff5f5;border:2px solid #ffc9c9;border-radius:14px;padding:30px 24px;text-align:center;margin-bottom:28px}
.error-card .ei{font-size:36px;margin-bottom:10px}
.error-card .et{font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--red);margin-bottom:6px}
.error-card .em{font-size:13px;color:var(--muted)}
.error-card pre{background:#f8f9fa;border-radius:8px;padding:10px;margin-top:12px;font-size:11px;color:#666;text-align:left;overflow-x:auto}

.empty-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:40px 24px;text-align:center;box-shadow:var(--shadow);margin-bottom:28px}
.empty-card .empty-icon{font-size:40px;margin-bottom:12px}
.empty-card .empty-title{font-family:var(--font-display);font-size:16px;font-weight:700;color:var(--text);margin-bottom:6px}
.empty-card .empty-msg{font-size:13px;color:var(--muted);max-width:400px;margin:0 auto}

.footer{text-align:center;padding:30px 24px;border-top:1px solid var(--border);background:var(--white);font-size:12px;color:var(--muted);font-weight:500}
.footer a{color:var(--red);text-decoration:none;font-weight:600}
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:40vh;gap:20px}
.spinner{width:44px;height:44px;border:3px solid #e8eaed;border-top-color:var(--red);border-radius:50%;animation:sp .7s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
.loading-text{font-size:13px;font-weight:600;color:var(--muted)}
.empty{padding:24px;text-align:center;color:var(--muted);font-size:13px}

@media(max-width:768px){
  .header-inner{flex-direction:column;text-align:center}
  .podium{gap:8px}.pp{flex:1!important;padding:14px 10px}
  .tr{flex-wrap:wrap}.tr-bar-w{flex-basis:100%;order:3}
  .sites-grid{grid-template-columns:1fr}
}
</style>
</head>
<body>

<div class="header"><div class="header-inner">
  <div class="logo">
    <div class="logo-icon">🏁</div>
    <div><div class="logo-text">Pole Position Elite</div><div class="logo-sub">Hyundai Championship</div></div>
  </div>
  <div class="header-right">
    <div class="live-badge"><span class="live-dot"></span> Live</div>
    <div class="refresh-info" id="lastUpdate"></div>
  </div>
</div></div>

<div class="main" id="app">
  <div class="loading"><div class="spinner"></div><div class="loading-text">Fetching leaderboard…</div></div>
</div>

<div class="footer">
  Pole Position Elite &mdash; Hyundai Dealership Network &mdash;
  <a href="https://script.google.com/macros/s/AKfycby9BqDs3fFwJeu2tw_diPySS9-WXN1c2PlTIg8HGVjaUxAOlgfbXbaii4nHUyZdI4CO/exec" target="_blank">Submit Entry</a>
  &mdash; Refreshes every 30s
</div>

<script>
// ═══════════════════════════════════════════
//  HARDCODED URLS — no config panel needed
// ═══════════════════════════════════════════
const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRBRrOAAAouBhjk7mwd9lkVWSYX6ND-ts7VeOYgdYTPpg-HbiWNSi9a1teMe7Mw5iHYJnNtIBRG_pMv/pub?gid=1696887404&single=true&output=csv";
const FORM_URL = "https://script.google.com/macros/s/AKfycby9BqDs3fFwJeu2tw_diPySS9-WXN1c2PlTIg8HGVjaUxAOlgfbXbaii4nHUyZdI4CO/exec";

const PTS = {"New Car Order":5,"Test Drive":2,"Part Exchange":2,"Appointment Booked":1,"Finance Proposal":1};
const ALL_ACT = Object.keys(PTS);
const FJB = 5;
const SITES = ["Boston","Kings Lynn","Lincoln","Worksop","Burton"];

let prevLB = [];
let feed = [];

async function fetchData() {
  const res = await fetch(CSV_URL);
  if (!res.ok) throw new Error("HTTP " + res.status);
  const txt = await res.text();
  
  // Debug: log what we got
  console.log("CSV response (first 500 chars):", txt.substring(0, 500));
  
  const lines = txt.split("\n");
  console.log("CSV lines:", lines.length);
  console.log("Header:", lines[0]);
  if (lines[1]) console.log("First data row:", lines[1]);
  
  const lb = [];
  for (let i = 1; i < lines.length; i++) {
    const line = lines[i].trim();
    if (!line) continue;
    
    // Handle CSV properly — fields may be quoted
    const parts = [];
    let current = "";
    let inQuotes = false;
    for (let j = 0; j < line.length; j++) {
      const ch = line[j];
      if (ch === '"') { inQuotes = !inQuotes; }
      else if (ch === ',' && !inQuotes) { parts.push(current.trim()); current = ""; }
      else { current += ch; }
    }
    parts.push(current.trim());
    
    const name = parts[0] || "";
    const site = parts[1] || "";
    const laps = parseInt(parts[2]) || 0;
    
    if (name) {
      lb.push({ name, site, laps });
    }
  }
  
  console.log("Parsed entries:", lb.length);
  lb.forEach(e => console.log("  ", e.name, "|", e.site, "|", e.laps));
  
  return lb;
}

function render(lb) {
  const hasData = lb.length > 0;
  const maxL = lb[0]?.laps || 1;
  const totL = lb.reduce((s, d) => s + d.laps, 0);
  const totP = lb.length;

  // Site aggregation
  const sd = {};
  SITES.forEach(s => sd[s] = { laps: 0, m: 0 });
  lb.forEach(d => { if (sd[d.site] !== undefined) { sd[d.site].laps += d.laps; sd[d.site].m++; } });
  const maxSL = Math.max(...Object.values(sd).map(s => s.laps), 1);

  // Feed
  if (prevLB.length && hasData) {
    lb.forEach(d => {
      const p = prevLB.find(x => x.name === d.name);
      if (p && d.laps > p.laps) {
        feed.unshift({
          txt: `<strong>${d.name}</strong> earned <strong>+${d.laps - p.laps}</strong> laps`,
          tm: new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit' })
        });
      }
    });
    feed = feed.slice(0, 50);
  }

  const app = document.getElementById('app');
  let h = '';

  // Update timestamp
  document.getElementById('lastUpdate').textContent = 'Updated ' + new Date().toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', second: '2-digit' });

  if (!hasData) {
    h += `<div class="empty-card">
      <div class="empty-icon">📋</div>
      <div class="empty-title">No Entries Yet</div>
      <div class="empty-msg">The sheet is connected but the Leaderboard tab appears empty. Submit some activities via the <a href="${FORM_URL}" target="_blank" style="color:var(--red);font-weight:600">entry form</a> and they should appear here within 30 seconds.</div>
    </div>`;
    h += `<div class="stitle">Points System</div><div class="md-grid"><div class="md-c"><h4>Activity Points</h4>
      <div class="md-r"><span class="l">🚗 New Car Order</span><span class="v">5 laps</span></div>
      <div class="md-r"><span class="l">🏎️ Test Drive</span><span class="v">2 laps</span></div>
      <div class="md-r"><span class="l">🔄 Part Exchange</span><span class="v">2 laps</span></div>
      <div class="md-r"><span class="l">📅 Appointment Booked</span><span class="v">1 lap</span></div>
      <div class="md-r"><span class="l">💰 Finance Proposal</span><span class="v">1 lap</span></div>
      <div class="md-r"><span class="l">🎯 Full Journey Bonus</span><span class="v" style="color:var(--green)">${FJB} laps</span></div></div></div>`;
    app.innerHTML = h;
    prevLB = [];
    return;
  }

  // ═══ FULL DASHBOARD ═══

  // Stats
  const topSite = Object.entries(sd).sort((a, b) => b[1].laps - a[1].laps)[0];
  h += `<div class="stats-row">
    <div class="stat"><div class="stat-label">Total Laps</div><div class="stat-value">${totL.toLocaleString()}</div><div class="stat-sub">All sites combined</div></div>
    <div class="stat"><div class="stat-label">Salespeople</div><div class="stat-value">${totP}</div><div class="stat-sub">${SITES.length} dealerships</div></div>
    <div class="stat"><div class="stat-label">Leader</div><div class="stat-value">${lb[0].laps}</div><div class="stat-sub">${lb[0].name}</div></div>
    <div class="stat"><div class="stat-label">Top Site</div><div class="stat-value">${topSite[1].laps}</div><div class="stat-sub">${topSite[0]}</div></div>
  </div>`;

  // Podium
  if (lb.length >= 3) {
    h += `<div class="stitle">Championship Podium</div><div class="podium">`;
    lb.slice(0, 3).forEach((d, i) => {
      const c = ['first', 'second', 'third'][i];
      h += `<div class="pp ${c}"><div class="pp-rank">${i + 1}</div><div class="pp-name">${d.name}</div><div class="pp-site">${d.site}</div><div class="pp-laps">${d.laps}<span>laps</span></div></div>`;
    });
    h += `</div>`;
  }

  // Race Positions
  h += `<div class="stitle">Race Positions</div><div class="track">`;
  lb.slice(0, 15).forEach((d, i) => {
    const pct = Math.max(d.laps / maxL * 100, 8);
    const pc = i < 3 ? `p${i + 1}` : '';
    const bc = i < 3 ? `p${i + 1}` : 'ot';
    h += `<div class="tr"><div class="tr-pos ${pc}">${i + 1}</div><div class="tr-drv"><div class="tr-nm">${d.name}</div><div class="tr-site">${d.site}</div></div><div class="tr-bar-w"><div class="tr-bar ${bc}" style="width:${pct}%"><em>${d.laps}</em></div></div></div>`;
  });
  h += `</div>`;

  // Site Performance
  const ss = Object.entries(sd).sort((a, b) => b[1].laps - a[1].laps);
  h += `<div class="stitle">Site Performance</div><div class="sites-grid">`;
  ss.forEach(([n, info]) => {
    const pct = maxSL > 0 ? info.laps / maxSL * 100 : 0;
    const avg = info.m ? (info.laps / info.m).toFixed(1) : 0;
    const top = lb.find(d => d.site === n);
    h += `<div class="site-c"><div class="site-hdr"><div><div class="site-nm">${n}</div></div><div class="site-laps">${info.laps}<i>laps</i></div></div>
    <div class="site-meta"><span>${info.m} salespeople</span><span>Avg ${avg}</span></div>
    <div style="font-size:12px;color:var(--muted)">Top: <span style="color:var(--text);font-weight:600">${top?.name || '—'}</span></div>
    <div class="site-bar"><div class="site-bar-f" style="width:${pct}%"></div></div></div>`;
  });
  h += `</div>`;

  // Live Feed
  h += `<div class="stitle">Live Activity Feed</div><div class="feed">`;
  if (!feed.length) h += `<div class="empty">Feed populates as laps change between refreshes</div>`;
  else feed.forEach(f => { h += `<div class="fi"><div class="fi-dot"></div><div class="fi-txt">${f.txt}</div><div class="fi-time">${f.tm}</div></div>`; });
  h += `</div>`;

  // MD Dashboard
  h += `<div class="md-banner"><div class="md-banner-icon">📊</div><div class="md-banner-text"><h3>MD Dashboard</h3><p>Management overview. A daily email with this data is sent every morning.</p></div></div>`;
  h += `<div class="md-grid">`;
  h += `<div class="md-c"><h4>Overview</h4>
    <div class="md-r"><span class="l">Total Laps</span><span class="v">${totL}</span></div>
    <div class="md-r"><span class="l">Salespeople</span><span class="v">${totP}</span></div>
    <div class="md-r"><span class="l">Avg / Person</span><span class="v">${(totL / totP).toFixed(1)}</span></div>
    <div class="md-r"><span class="l">Leader Gap</span><span class="v">${lb.length > 1 ? lb[0].laps - lb[1].laps : 0} laps</span></div></div>`;
  h += `<div class="md-c"><h4>Site Rankings</h4>`;
  ss.forEach(([n, info], i) => { const avg = info.m ? (info.laps / info.m).toFixed(1) : 0; h += `<div class="md-r"><span class="l">${i + 1}. ${n}</span><span class="v">${info.laps} laps (${avg} avg)</span></div>`; });
  h += `</div><div class="md-c"><h4>Points System</h4>
    <div class="md-r"><span class="l">🚗 New Car Order</span><span class="v">5 laps</span></div>
    <div class="md-r"><span class="l">🏎️ Test Drive</span><span class="v">2 laps</span></div>
    <div class="md-r"><span class="l">🔄 Part Exchange</span><span class="v">2 laps</span></div>
    <div class="md-r"><span class="l">📅 Appointment Booked</span><span class="v">1 lap</span></div>
    <div class="md-r"><span class="l">💰 Finance Proposal</span><span class="v">1 lap</span></div>
    <div class="md-r"><span class="l">🎯 Full Journey Bonus</span><span class="v" style="color:var(--green)">${FJB} laps</span></div></div></div>`;

  app.innerHTML = h;
  prevLB = JSON.parse(JSON.stringify(lb));
}

// ═══ MAIN LOOP ═══
async function update() {
  try {
    const lb = await fetchData();
    render(lb);
  } catch (e) {
    console.error("Fetch failed:", e);
    const app = document.getElementById('app');
    app.innerHTML = `<div class="error-card">
      <div class="ei">⚠️</div>
      <div class="et">Could not load data</div>
      <div class="em">Check that the Leaderboard sheet is published as CSV and has data in it.</div>
      <pre>Error: ${e.message}\nURL: ${CSV_URL}</pre>
    </div>`;
  }
}

update();
setInterval(update, 30000);
</script>
</body>
</html>
